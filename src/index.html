<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contacts</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:           var(--hub-bg, #f9fafb);
      --card:         var(--hub-surface, #ffffff);
      --border:       var(--hub-border, #e5e7eb);
      --text:         var(--hub-text, #111827);
      --muted:        var(--hub-text-muted, #6b7280);
      --accent:       var(--hub-primary, #111827);
      --accent-fg:    var(--hub-primary-fg, #ffffff);
      --accent-hover: var(--hub-primary-hover, #374151);
      --radius:       var(--hub-radius, 0.5rem);
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: var(--hub-font-size, 15px); }
    .app { max-width: 640px; margin: 0 auto; padding: 20px 16px 60px; }

    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 8px; }
    .header h1 { font-size: 1.4rem; font-weight: 700; }
    .header-actions { display: flex; gap: 8px; }
    .btn { background: var(--accent); color: var(--accent-fg); border: none; border-radius: 8px; padding: 7px 14px; font-size: 0.82rem; font-weight: 600; cursor: pointer; }
    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: .5; cursor: default; }
    .btn-outline { background: transparent; color: var(--accent); border: 1.5px solid var(--border); }
    .btn-outline:hover { border-color: var(--accent); }
    .btn-danger { background: #dc2626; color: #fff; }
    .btn-danger:hover { background: #b91c1c; }

    .search-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .search { flex: 1; border: 1.5px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 0.9rem; background: var(--card); color: var(--text); }
    .search:focus { outline: none; border-color: var(--accent); }

    .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
    .chip { border: 1.5px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 0.78rem; cursor: pointer; background: var(--card); color: var(--muted); }
    .chip.active { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }

    .empty { text-align: center; padding: 48px 16px; color: var(--muted); }
    .empty p { margin-bottom: 12px; }

    .contact-list { display: flex; flex-direction: column; gap: 2px; }
    .contact-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; display: flex; align-items: flex-start; gap: 12px; cursor: pointer; transition: border-color 0.15s; }
    .contact-item:hover { border-color: var(--accent); }
    .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); color: var(--accent-fg); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1rem; flex-shrink: 0; }
    .contact-info { flex: 1; min-width: 0; }
    .contact-name { font-weight: 600; font-size: 0.95rem; }
    .contact-meta { font-size: 0.8rem; color: var(--muted); margin-top: 2px; display: flex; gap: 10px; flex-wrap: wrap; }
    .contact-category { display: inline-block; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 1px 8px; font-size: 0.72rem; color: var(--muted); }

    /* Modal */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .modal { background: var(--card); border-radius: 14px; padding: 24px; width: 100%; max-width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,.2); max-height: 90vh; overflow-y: auto; }
    .modal h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 18px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 5px; color: var(--muted); }
    .field input, .field select, .field textarea { width: 100%; border: 1.5px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 0.9rem; background: var(--bg); color: var(--text); }
    .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--accent); }
    .field textarea { resize: vertical; min-height: 70px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
    .modal-left { margin-right: auto; }

    /* Import */
    .import-area { border: 2px dashed var(--border); border-radius: 10px; padding: 24px; text-align: center; cursor: pointer; color: var(--muted); font-size: 0.85rem; transition: border-color 0.15s; }
    .import-area:hover, .import-area.drag { border-color: var(--accent); color: var(--text); }
    .import-area input { display: none; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Contacts</h1>
    <div class="header-actions">
      <button class="btn btn-outline" onclick="openImport()">Import .vcf</button>
      <button class="btn" onclick="openForm()">+ Add</button>
    </div>
  </div>

  <div class="search-row">
    <input class="search" type="search" placeholder="Search by name, phone, email…" oninput="render()" id="searchInput" />
  </div>
  <div class="filter-row" id="filterRow"></div>

  <div id="list" class="contact-list"></div>
</div>

<!-- Add / Edit modal -->
<div class="overlay" id="formOverlay" style="display:none" onclick="if(event.target===this)closeForm()">
  <div class="modal">
    <h2 id="formTitle">Add Contact</h2>
    <div class="field"><label>Name *</label><input id="fName" type="text" placeholder="Full name" /></div>
    <div class="field"><label>Phone</label><input id="fPhone" type="tel" placeholder="+1 555 000 0000" /></div>
    <div class="field"><label>Email</label><input id="fEmail" type="email" placeholder="name@example.com" /></div>
    <div class="field">
      <label>Category</label>
      <select id="fCategory">
        <option value="">— none —</option>
        <option>doctor</option><option>dentist</option><option>school</option>
        <option>emergency</option><option>neighbor</option><option>plumber</option>
        <option>electrician</option><option>family</option><option>friend</option>
        <option>other</option>
      </select>
    </div>
    <div class="field"><label>Address</label><input id="fAddress" type="text" placeholder="123 Main St, City" /></div>
    <div class="field"><label>Notes</label><textarea id="fNotes" placeholder="Any useful notes…"></textarea></div>
    <div class="modal-actions">
      <div class="modal-left">
        <button class="btn btn-danger" id="deleteBtn" onclick="deleteContact()" style="display:none">Delete</button>
      </div>
      <button class="btn btn-outline" onclick="closeForm()">Cancel</button>
      <button class="btn" onclick="saveContact()">Save</button>
    </div>
  </div>
</div>

<!-- Import modal -->
<div class="overlay" id="importOverlay" style="display:none" onclick="if(event.target===this)closeImport()">
  <div class="modal">
    <h2>Import from vCard (.vcf)</h2>
    <p style="font-size:0.85rem;color:var(--muted);margin-bottom:16px">
      Export contacts from your phone as a .vcf file and upload here.
      Imported contacts are added to the shared household address book.
    </p>
    <div class="import-area" id="dropZone" ondragover="onDrag(event,true)" ondragleave="onDrag(event,false)" ondrop="onDrop(event)">
      <label for="vcfFile">
        <div style="font-size:1.8rem;margin-bottom:8px">📂</div>
        Drop a .vcf file here or <u>click to browse</u>
        <input type="file" id="vcfFile" accept=".vcf,text/vcard" onchange="handleFile(this.files[0])" />
      </label>
    </div>
    <p id="importStatus" style="margin-top:12px;font-size:0.85rem;color:var(--muted)"></p>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeImport()">Close</button>
    </div>
  </div>
</div>

<script type="module">
import { hubAlert, hubConfirm, esc } from "/hub-sdk.js";
import { categories, filterContacts, parseVCards } from "./logic.js";

const DB = window.__DB_URL ?? '';

let contacts      = [];
let editingId     = null;
let activeCategory = '';

/* ── DB helper ─────────────────────────────────────────────────────────────── */
async function db(sql, params = []) {
  if (!DB) return { rows: [] };
  const res = await fetch(DB, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sql, params }),
  });
  if (!res.ok) throw new Error(`DB error ${res.status}`);
  return res.json();
}

/* ── Data loading ──────────────────────────────────────────────────────────── */
async function load() {
  try {
    const result = await db(
      'SELECT id, display_name, email, phone, category, address, notes, created_by, created_at, updated_at FROM app_contacts__contacts ORDER BY display_name'
    );
    contacts = (result.rows ?? []).map(r => ({
      id:          r.id,
      displayName: r.display_name,
      email:       r.email,
      phone:       r.phone,
      category:    r.category,
      address:     r.address,
      notes:       r.notes,
      createdBy:   r.created_by,
      createdAt:   r.created_at,
      updatedAt:   r.updated_at,
    }));
  } catch {
    contacts = [];
  }
  render();
}

/* ── Rendering ─────────────────────────────────────────────────────────────── */
function render() {
  const q        = document.getElementById('searchInput').value.trim();
  const filtered = filterContacts(contacts, q, activeCategory);
  const cats     = categories(contacts);

  const fr = document.getElementById('filterRow');
  // Category strings can be attacker-controlled (the .vcf import sets `category`
  // from the vCard CATEGORIES field, bypassing the fixed <select>). Escape them
  // and bind via data-* + addEventListener rather than interpolating into an
  // inline onclick — HTML escaping alone is not safe inside a JS attribute.
  fr.innerHTML = cats.length ? `
    <button class="chip ${!activeCategory ? 'active' : ''}" data-cat="">All</button>
    ${cats.map(c => `<button class="chip ${activeCategory===c ? 'active' : ''}" data-cat="${esc(c)}">${esc(c)}</button>`).join('')}
  ` : '';
  fr.querySelectorAll('.chip[data-cat]').forEach(btn =>
    btn.addEventListener('click', () => setCategory(btn.dataset.cat)));

  const el = document.getElementById('list');
  if (!filtered.length) {
    el.innerHTML = `<div class="empty">
      <p>${contacts.length ? 'No contacts match your search.' : 'No contacts yet.'}</p>
      ${!contacts.length ? '<button class="btn" onclick="openForm()">Add your first contact</button>' : ''}
    </div>`;
    return;
  }

  el.innerHTML = filtered.map(c => `
    <div class="contact-item" onclick="openForm('${c.id}')">
      <div class="avatar">${esc((c.displayName[0]||'?').toUpperCase())}</div>
      <div class="contact-info">
        <div class="contact-name">
          ${esc(c.displayName)}
          ${c.category ? `<span class="contact-category">${esc(c.category)}</span>` : ''}
        </div>
        <div class="contact-meta">
          ${c.phone   ? `<span>📞 ${esc(c.phone)}</span>`   : ''}
          ${c.email   ? `<span>✉️ ${esc(c.email)}</span>`   : ''}
          ${c.address ? `<span>📍 ${esc(c.address)}</span>` : ''}
        </div>
        ${c.notes ? `<div style="font-size:0.78rem;color:var(--muted);margin-top:4px">${esc(c.notes)}</div>` : ''}
      </div>
    </div>
  `).join('');
}

function setCategory(cat) {
  activeCategory = cat;
  render();
}

/* ── Form ──────────────────────────────────────────────────────────────────── */
function openForm(id) {
  editingId = id || null;
  const c = id ? contacts.find(x => x.id === id) : null;
  document.getElementById('formTitle').textContent = c ? 'Edit Contact' : 'Add Contact';
  document.getElementById('fName').value     = c?.displayName || '';
  document.getElementById('fPhone').value    = c?.phone || '';
  document.getElementById('fEmail').value    = c?.email || '';
  document.getElementById('fCategory').value = c?.category || '';
  document.getElementById('fAddress').value  = c?.address || '';
  document.getElementById('fNotes').value    = c?.notes || '';
  document.getElementById('deleteBtn').style.display = c ? '' : 'none';
  document.getElementById('formOverlay').style.display = 'flex';
  document.getElementById('fName').focus();
}

function closeForm() {
  document.getElementById('formOverlay').style.display = 'none';
  editingId = null;
}

async function saveContact() {
  const displayName = document.getElementById('fName').value.trim();
  const phone       = document.getElementById('fPhone').value.trim() || null;
  const email       = document.getElementById('fEmail').value.trim() || null;
  const category    = document.getElementById('fCategory').value || null;
  const address     = document.getElementById('fAddress').value.trim() || null;
  const notes       = document.getElementById('fNotes').value.trim() || null;
  if (!displayName) { hubAlert('Name is required'); return; }

  const now = new Date().toISOString();
  const prevContacts = contacts;

  if (editingId) {
    contacts = contacts.map(c => c.id === editingId
      ? { ...c, displayName, phone, email, category, address, notes, updatedAt: now }
      : c);
    closeForm();
    render();
    try {
      await db(
        'UPDATE app_contacts__contacts SET display_name=?, phone=?, email=?, category=?, address=?, notes=?, updated_at=? WHERE id=?',
        [displayName, phone, email, category, address, notes, now, editingId]
      );
    } catch {
      contacts = prevContacts;
      render();
    }
  } else {
    const id        = crypto.randomUUID();
    const createdBy = window.__CURRENT_MEMBER?.id ?? null;
    const tempContact = { id, displayName, phone, email, category, address, notes, createdBy, createdAt: now, updatedAt: now };
    contacts = [...contacts, tempContact].sort((a, b) => a.displayName.localeCompare(b.displayName));
    closeForm();
    render();
    try {
      await db(
        'INSERT INTO app_contacts__contacts (id, display_name, email, phone, category, address, notes, created_by, created_at, updated_at) VALUES (?,?,?,?,?,?,?,?,?,?)',
        [id, displayName, email, phone, category, address, notes, createdBy, now, now]
      );
    } catch {
      contacts = prevContacts;
      render();
    }
  }
}

async function deleteContact() {
  if (!editingId || !await hubConfirm({ message: 'Delete this contact?', confirmLabel: 'Delete', destructive: true })) return;
  const id = editingId;
  const prevContacts = contacts;
  contacts = contacts.filter(c => c.id !== id);
  closeForm();
  render();
  try {
    await db('DELETE FROM app_contacts__contacts WHERE id=?', [id]);
  } catch {
    contacts = prevContacts;
    render();
  }
}

/* ── Import ────────────────────────────────────────────────────────────────── */
function openImport() {
  document.getElementById('importStatus').textContent = '';
  document.getElementById('importOverlay').style.display = 'flex';
}
function closeImport() {
  document.getElementById('importOverlay').style.display = 'none';
  document.getElementById('vcfFile').value = '';
}
function onDrag(e, over) {
  e.preventDefault();
  document.getElementById('dropZone').classList.toggle('drag', over);
}
function onDrop(e) {
  e.preventDefault();
  onDrag(e, false);
  handleFile(e.dataTransfer.files[0]);
}

async function handleFile(file) {
  if (!file) return;
  const status = document.getElementById('importStatus');
  if (file.size > 1024 * 1024) { status.textContent = 'File too large (max 1 MB)'; return; }
  status.textContent = 'Importing…';

  try {
    const text   = await file.text();
    const parsed = parseVCards(text);
    if (!parsed.length) { status.textContent = 'No valid contacts found in file.'; return; }

    const now       = new Date().toISOString();
    const createdBy = window.__CURRENT_MEMBER?.id ?? null;

    const newContacts = parsed.map(p => ({
      id:          crypto.randomUUID(),
      displayName: p.displayName,
      email:       p.email ?? null,
      phone:       p.phone ?? null,
      category:    p.category ?? null,
      address:     p.address ?? null,
      notes:       p.notes ?? null,
      createdBy,
      createdAt:   now,
      updatedAt:   now,
    }));

    for (const c of newContacts) {
      await db(
        'INSERT INTO app_contacts__contacts (id, display_name, email, phone, category, address, notes, created_by, created_at, updated_at) VALUES (?,?,?,?,?,?,?,?,?,?)',
        [c.id, c.displayName, c.email, c.phone, c.category, c.address, c.notes, c.createdBy, c.createdAt, c.updatedAt]
      );
    }

    contacts = [...contacts, ...newContacts].sort((a, b) => a.displayName.localeCompare(b.displayName));
    status.textContent = `✓ Imported ${newContacts.length} contact${newContacts.length !== 1 ? 's' : ''}`;
    render();
  } catch {
    status.textContent = 'Import failed — please try again';
  }
}

load();

window.openForm      = openForm;
window.closeForm     = closeForm;
window.saveContact   = saveContact;
window.deleteContact = deleteContact;
window.setCategory   = setCategory;
window.openImport    = openImport;
window.closeImport   = closeImport;
window.onDrag        = onDrag;
window.onDrop        = onDrop;
window.handleFile    = handleFile;
</script>
</body>
</html>
